services:

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: auth-service

    env_file:
      - .env.docker

    ports:
      - "8000:8000"

    depends_on:
      - mongo
      - redis

    restart: unless-stopped

  mongo:
    image: mongo:8

    container_name: mongo

    ports:
      - "27030:27017"

    volumes:
      - mongo_data:/data/db

    restart: unless-stopped

  redis:
    image: redis:8-alpine

    container_name: redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    restart: unless-stopped

volumes:
  mongo_data:
  redis_data: