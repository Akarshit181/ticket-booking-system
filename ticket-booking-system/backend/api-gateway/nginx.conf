# Configure worker connection
# Instead of the default, we explicitly define the number of simultaneous connections each worker can handle
events {
    worker_connections 1024; 
}

# Everything related to http live here
http {

# This will create the logical backend. Instead of writing proxy_pass http://auth-service:8000; everywhere we use proxy_pass http://auth_service;
# Later, load balancing becomes as simple as:
# upstream auth_service {
#     server auth-service-1:8000;
#     server auth-service-2:8000;
#     server auth-service-3:8000;
 # }

    # MIME types
    include /etc/nginx/mime.types;
    default_type  application/octet-stream;
    # Performance
    sendfile on;
    keepalive_timeout 65;
    # Security
    server_tokens off;

    #
    # Logging
    #

    log_format main
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" '
        '"$http_user_agent" '
        '$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;


    upstream auth_service {
        server auth-service:8000;
    }



    # Future microservices
    # upstream user_service {
    #     server user-service:8001;
    # }

    # upstream booking_service {
    #     server booking-service:8002;
    # }

    server {

        listen 80;

        server_name _;

        # ==========================
        # Auth Service
        # ==========================


        location /api/v1/auth/ {

            proxy_pass http://auth_service;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================
        # Health Endpoint
        # ==========================

        location = /api/v1/health {

            proxy_pass http://auth_service;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

         # ==========================
        # Swagger (Development Only)
        # ==========================


        location /docs {
            proxy_pass http://auth_service;
        }

        location /openapi.json {
            proxy_pass http://auth_service;
        }

        location /redoc {
            proxy_pass http://auth_service;
        }


        # ==========================
        # Future Services
        # ==========================

        # location /api/v1/users/ {
        #     proxy_pass http://user_service;
        # }

        # location /api/v1/bookings/ {
        #     proxy_pass http://booking_service;
        # }
    }
}

# What is NGINX?
# NGINX (pronounced as Engine-X) is a high performance web server and revers proxy. In a microservices architecture, it's most common role is to act as the entry point for all client requests.
# Think of it as front door of backend.

#                      Angular
#                          │
#                          ▼
#                  localhost:8080
#                          │
#                      NGINX Gateway
#                          │
#         ┌────────────────┼────────────────┐
#         │                │                │
#         ▼                ▼                ▼
#    Auth Service     User Service    Booking Service



# User
