<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
</head>

<body style="font-family: Arial, Helvetica, sans-serif; background-color:#f5f5f5; margin:0; padding:40px;">

    <table
        style="max-width:600px; margin:auto; background:#ffffff; border-radius:8px; padding:30px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">

        <tr>
            <td align="center">
                <h2>Ticket Booking System</h2>
            </td>
        </tr>

        <tr>
            <td>

                <p>Hello <strong>{{ username }}</strong>,</p>

                <p>
                    We received a request to reset your password.
                </p>

                <p style="text-align:center; margin:30px 0;">
                    <a href="{{ reset_link }}"
                        style="background:#dc2626; color:white; padding:12px 24px; text-decoration:none; border-radius:5px;">
                        Reset Password
                    </a>
                </p>

                <p>
                    If you did not request a password reset, simply ignore this email.
                </p>

            </td>
        </tr>

    </table>

</body>

</html>
